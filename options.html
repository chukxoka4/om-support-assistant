<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OM Support Assistant — Options</title>
  <style>
    body { font: 14px/1.5 -apple-system, system-ui, sans-serif; max-width: 560px; margin: 32px auto; padding: 0 16px; color: #222; }
    h1 { font-size: 18px; }
    h2 { font-size: 14px; margin-top: 24px; color: #555; text-transform: uppercase; letter-spacing: 0.4px; }
    label { display: block; margin: 10px 0 4px; font-weight: 500; }
    input[type=password], input[type=text], select { width: 100%; box-sizing: border-box; padding: 7px 9px; border: 1px solid #ccc; border-radius: 4px; font: inherit; }
    .row { margin-bottom: 12px; }
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    button { padding: 7px 14px; border-radius: 4px; border: 1px solid #ccc; background: #f5f5f5; cursor: pointer; font: inherit; }
    button.primary { background: #1a73e8; color: #fff; border-color: #1a73e8; }
    .status { margin-top: 10px; color: #0a7c2f; font-size: 13px; }
    .hint { font-size: 12px; color: #888; }
    .import-confirm { margin-top: 14px; padding: 12px; border: 1px solid #e0e0e0; border-radius: 6px; background: #fafafa; }
    .import-confirm__summary { font-size: 13px; line-height: 1.6; margin-bottom: 10px; }
    .import-confirm__summary b { font-weight: 600; }
    .toasts { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 9999; pointer-events: none; }
    .toast { pointer-events: auto; min-width: 280px; max-width: 480px; padding: 10px 32px 10px 14px; border-radius: 6px; font-size: 13px; line-height: 1.4; box-shadow: 0 4px 14px rgba(0,0,0,0.18); position: relative; cursor: pointer; }
    .toast--ok { background: #e6f4ea; color: #0a7c2f; border: 1px solid #a6dab2; }
    .toast--err { background: #fce8e6; color: #b00020; border: 1px solid #f1b1ae; }
    .toast__close { position: absolute; top: 6px; right: 8px; font-size: 16px; line-height: 1; opacity: 0.6; }
  </style>
</head>
<body>
  <div id="toasts" class="toasts" aria-live="polite"></div>
  <h1>OM Support Assistant — Options</h1>

  <h2>API Keys (all optional)</h2>
  <p class="hint">Only providers with keys will appear as options. Keys are stored in Chrome sync storage.</p>
  <div class="row">
    <label for="gemini-key">Gemini</label>
    <input id="gemini-key" type="password" autocomplete="off" />
  </div>
  <div class="row">
    <label for="claude-key">Claude</label>
    <input id="claude-key" type="password" autocomplete="off" />
  </div>
  <div class="row">
    <label for="openai-key">OpenAI</label>
    <input id="openai-key" type="password" autocomplete="off" />
  </div>

  <div class="row">
    <label for="default-provider">Default provider</label>
    <select id="default-provider"></select>
  </div>

  <div class="btn-row">
    <button id="save" class="primary">Save</button>
  </div>
  <div class="status" id="status"></div>

  <h2>Prompt library</h2>
  <p class="hint">Export to share with teammates. Import accepts JSON exports from this extension.</p>
  <div class="btn-row">
    <button id="export">Export library</button>
    <button id="import">Import library…</button>
    <button id="reset-library">Reset to seeds</button>
    <input type="file" id="import-file" accept=".json" style="display:none" />
  </div>
  <div class="status" id="library-status"></div>

  <div id="import-confirm" class="import-confirm" hidden>
    <div class="import-confirm__summary" id="import-summary"></div>
    <div class="btn-row">
      <button id="import-merge" class="primary">Merge new only</button>
      <button id="import-replace">Replace all</button>
      <button id="import-cancel">Cancel</button>
    </div>
    <p class="hint" id="import-merge-hint"></p>
    <p class="hint" id="import-replace-hint" style="color:#b00020"></p>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
