<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OM Support Assistant — Options</title>
  <style>
    body { font: 14px/1.5 -apple-system, system-ui, sans-serif; max-width: 560px; margin: 32px auto; padding: 0 16px; color: #222; }
    h1 { font-size: 18px; }
    h2 { font-size: 14px; margin-top: 24px; color: #555; text-transform: uppercase; letter-spacing: 0.4px; }
    label { display: block; margin: 10px 0 4px; font-weight: 500; }
    input[type=password], input[type=text], select { width: 100%; box-sizing: border-box; padding: 7px 9px; border: 1px solid #ccc; border-radius: 4px; font: inherit; }
    .row { margin-bottom: 12px; }
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    button { padding: 7px 14px; border-radius: 4px; border: 1px solid #ccc; background: #f5f5f5; cursor: pointer; font: inherit; }
    button.primary { background: #1a73e8; color: #fff; border-color: #1a73e8; }
    .status { margin-top: 10px; color: #0a7c2f; font-size: 13px; }
    .hint { font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <h1>OM Support Assistant — Options</h1>

  <h2>API Keys (all optional)</h2>
  <p class="hint">Only providers with keys will appear as options. Keys are stored in Chrome sync storage.</p>
  <div class="row">
    <label for="gemini-key">Gemini</label>
    <input id="gemini-key" type="password" autocomplete="off" />
  </div>
  <div class="row">
    <label for="claude-key">Claude</label>
    <input id="claude-key" type="password" autocomplete="off" />
  </div>
  <div class="row">
    <label for="openai-key">OpenAI</label>
    <input id="openai-key" type="password" autocomplete="off" />
  </div>

  <div class="row">
    <label for="default-provider">Default provider</label>
    <select id="default-provider"></select>
  </div>

  <div class="btn-row">
    <button id="save" class="primary">Save</button>
  </div>
  <div class="status" id="status"></div>

  <h2>Prompt library</h2>
  <p class="hint">Export to share with teammates. Import accepts JSON exports from this extension.</p>
  <div class="btn-row">
    <button id="export">Export library</button>
    <button id="import">Import library…</button>
    <button id="reset-library">Reset to seeds</button>
    <input type="file" id="import-file" accept=".json" style="display:none" />
  </div>
  <div class="status" id="library-status"></div>

  <script type="module" src="options.js"></script>
</body>
</html>
